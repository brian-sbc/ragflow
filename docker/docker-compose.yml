# =============================================================================
# RAGFlow — single-file stack for Portainer (no `include:`, so nothing can be
# double-loaded into an include cycle). Based on upstream v0.26.1, customized:
#   - DOC_ENGINE=infinity (set in .env)        — lighter; no Elasticsearch
#   - external embeddings via vLLM             — slim image has none built in
#   - backing services NOT published to host   — avoids host port collisions
#   - server joined to external `proxy` net    — reachable by LiteLLM as `ragflow`
#   - self-hosted MCP server enabled on :9382  — Streamable HTTP at /mcp
#   - secrets come from Portainer stack env vars (MYSQL_PASSWORD, MINIO_PASSWORD,
#     REDIS_PASSWORD, MCP_HOST_API_KEY), not from this repo
#   - server's service_conf.yaml.template / entrypoint.sh mounts dropped (image
#     ships working defaults); mysql init.sql replaced with MYSQL_DATABASE env
#
# This REPLACES the upstream docker/docker-compose.yml. It is now FULLY
# SELF-CONTAINED — no sibling files are mounted, so nothing can go missing.
# The Infinity config is inlined as a compose `config` at the bottom of this file.
# You can delete docker-compose-base.yml, infinity_conf.toml, service_conf.yaml.template,
# entrypoint.sh, and init.sql from your fork — none of them are used anymore.
# =============================================================================

services:
  ragflow-server:
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      infinity:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    command:
    - --enable-adminserver
    - --init-model-provider-tables
    - --enable-mcpserver
    - --mcp-host=0.0.0.0
    - --mcp-port=9382
    - --mcp-base-url=http://127.0.0.1:9380
    - --mcp-script-path=/ragflow/mcp/server/server.py
    - --mcp-mode=self-host
    - --mcp-host-api-key=${MCP_HOST_API_KEY}
    ports:
    - ${SVR_WEB_HTTP_PORT}:80
    - ${SVR_HTTP_PORT}:9380
    - ${ADMIN_SVR_HTTP_PORT}:9381
    - ${SVR_MCP_PORT}:9382
    volumes:
    - ragflow_logs:/ragflow/logs
    - /opt/ragflow/server.py:/ragflow/mcp/server/server.py
    environment:
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    - MINIO_PASSWORD=${MINIO_PASSWORD}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    - SMTP_SERVER=${SMTP_SERVER}
    - SMTP_PORT=${SMTP_PORT}
    - SMTP_USE_SSL=${SMTP_USE_SSL}
    - SMTP_USE_TLS=${SMTP_USE_TLS}
    - SMTP_USERNAME=${SMTP_USERNAME}
    - SMTP_PASSWORD=${SMTP_PASSWORD}
    - SMTP_SENDER_NAME=${SMTP_SENDER_NAME}
    - SMTP_SENDER_EMAIL=${SMTP_SENDER_EMAIL}
    - SMTP_FRONTEND_URL=${SMTP_FRONTEND_URL}
    env_file: .env
    networks:
      ragflow: {}
      proxy:
        aliases:
        - ragflow
        - ragflow-server
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
  infinity:
    image: infiniflow/infinity:v0.7.0
    volumes:
    - infinity_data:/var/infinity
    configs:
    - source: infinity_conf
      target: /infinity_conf.toml
    command:
    - -f
    - /infinity_conf.toml
    env_file: .env
    mem_limit: ${MEM_LIMIT}
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    networks:
    - ragflow
    healthcheck:
      test:
      - CMD
      - curl
      - http://localhost:23820/admin/node/current
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
  mysql:
    image: mysql:8.0.39
    env_file: .env
    environment:
    - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
    - MYSQL_DATABASE=${MYSQL_DBNAME}
    - MYSQL_ROOT_HOST=%
    command: --max_connections=1000 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3" --binlog_expire_logs_seconds=604800
    volumes:
    - mysql_data:/var/lib/mysql
    networks:
    - ragflow
    healthcheck:
      test:
      - CMD
      - mysqladmin
      - ping
      - -uroot
      - -p${MYSQL_PASSWORD}
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    command:
    - server
    - --console-address
    - :9001
    - /data
    env_file: .env
    environment:
    - MINIO_ROOT_USER=${MINIO_USER}
    - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
    - minio_data:/data
    networks:
    - ragflow
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 10s
      retries: 120
  redis:
    image: valkey/valkey:8
    command:
    - redis-server
    - --requirepass
    - ${REDIS_PASSWORD}
    - --maxmemory
    - 128mb
    - --maxmemory-policy
    - allkeys-lru
    env_file: .env
    volumes:
    - redis_data:/data
    networks:
    - ragflow
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 10s
      retries: 120
volumes:
  ragflow_logs:
    driver: local
  infinity_data:
    driver: local
  mysql_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
networks:
  ragflow:
    driver: bridge
  proxy:
    external: true

configs:
  infinity_conf:
    content: |
      [general]
      version                  = "0.7.0"
      time_zone                = "utc-8"

      [network]
      server_address           = "0.0.0.0"
      postgres_port            = 5432
      http_port                = 23820
      client_port              = 23817
      connection_pool_size     = 128

      [log]
      log_filename             = "infinity.log"
      log_dir                  = "/var/infinity/log"
      log_to_stdout            = true
      log_file_max_size        = "100MB"
      log_file_rotate_count    = 10

      # trace/debug/info/warning/error/critical 6 log levels, default: info
      log_level               = "info"

      [storage]
      persistence_dir         = "/var/infinity/persistence"
      data_dir                = "/var/infinity/data"
      # periodically activates garbage collection:
      # 0 means real-time,
      # s means seconds, for example "60s", 60 seconds
      # m means minutes, for example "60m", 60 minutes
      # h means hours, for example "1h", 1 hour
      optimize_interval        = "10s"
      cleanup_interval         = "60s"
      compact_interval         = "120s"
      storage_type             = "local"

      # dump memory index entry when it reachs the capacity
      mem_index_capacity       = 65536

      # S3 storage config example:
      # [storage.object_storage]
      # url                      = "127.0.0.1:9000"
      # bucket_name              = "infinity"
      # access_key               = "minioadmin"
      # secret_key               = "minioadmin"
      # enable_https             = false

      [buffer]
      buffer_manager_size      = "8GB"
      lru_num                  = 7
      temp_dir                 = "/var/infinity/tmp"
      result_cache             = "off"
      memindex_memory_quota    = "1GB"

      [wal]
      wal_dir                       = "/var/infinity/wal"

      [resource]
