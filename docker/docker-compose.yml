# =============================================================================
# RAGFlow — single-file stack for Portainer (no `include:`, so nothing can be
# double-loaded into an include cycle). Based on upstream v0.26.1, customized:
#   - DOC_ENGINE=infinity (set in .env)        — lighter; no Elasticsearch
#   - external embeddings via vLLM             — slim image has none built in
#   - backing services NOT published to host   — avoids host port collisions
#   - server joined to external `proxy` net    — reachable by LiteLLM as `ragflow`
#   - self-hosted MCP server enabled on :9382  — Streamable HTTP at /mcp
#   - secrets come from Portainer stack env vars (MYSQL_PASSWORD, MINIO_PASSWORD,
#     REDIS_PASSWORD, MCP_HOST_API_KEY), not from this repo
#
# This REPLACES the upstream docker/docker-compose.yml. You can DELETE
# docker/docker-compose-base.yml from your fork — it is no longer used.
# Keep the other docker/ files (service_conf.yaml.template, entrypoint.sh,
# init.sql, infinity_conf.toml) — they are still mounted below.
# =============================================================================

services:
  ragflow-server:
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      infinity:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    command:
    - --enable-adminserver
    - --init-model-provider-tables
    - --enable-mcpserver
    - --mcp-host=0.0.0.0
    - --mcp-port=9382
    - --mcp-base-url=http://127.0.0.1:9380
    - --mcp-script-path=/ragflow/mcp/server/server.py
    - --mcp-mode=self-host
    - --mcp-host-api-key=${MCP_HOST_API_KEY}
    ports:
    - ${SVR_WEB_HTTP_PORT}:80
    - ${SVR_HTTP_PORT}:9380
    - ${ADMIN_SVR_HTTP_PORT}:9381
    - ${SVR_MCP_PORT}:9382
    volumes:
    - ./ragflow-logs:/ragflow/logs
    - ./service_conf.yaml.template:/ragflow/conf/service_conf.yaml.template
    - ./entrypoint.sh:/ragflow/entrypoint.sh
    environment:
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    - MINIO_PASSWORD=${MINIO_PASSWORD}
    - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file: .env
    networks:
      ragflow: {}
      proxy:
        aliases:
        - ragflow
        - ragflow-server
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
  infinity:
    image: infiniflow/infinity:v0.7.0
    volumes:
    - infinity_data:/var/infinity
    - ./infinity_conf.toml:/infinity_conf.toml
    command:
    - -f
    - /infinity_conf.toml
    env_file: .env
    mem_limit: ${MEM_LIMIT}
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    networks:
    - ragflow
    healthcheck:
      test:
      - CMD
      - curl
      - http://localhost:23820/admin/node/current
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
  mysql:
    image: mysql:8.0.39
    env_file: .env
    environment:
    - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
    command: --max_connections=1000 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3" --init-file /data/application/init.sql --binlog_expire_logs_seconds=604800
    volumes:
    - mysql_data:/var/lib/mysql
    - ./init.sql:/data/application/init.sql
    networks:
    - ragflow
    healthcheck:
      test:
      - CMD
      - mysqladmin
      - ping
      - -uroot
      - -p${MYSQL_PASSWORD}
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    command:
    - server
    - --console-address
    - :9001
    - /data
    env_file: .env
    environment:
    - MINIO_ROOT_USER=${MINIO_USER}
    - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD}
    volumes:
    - minio_data:/data
    networks:
    - ragflow
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 10s
      retries: 120
  redis:
    image: valkey/valkey:8
    command:
    - redis-server
    - --requirepass
    - ${REDIS_PASSWORD}
    - --maxmemory
    - 128mb
    - --maxmemory-policy
    - allkeys-lru
    env_file: .env
    volumes:
    - redis_data:/data
    networks:
    - ragflow
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 10s
      retries: 120
volumes:
  infinity_data:
    driver: local
  mysql_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
networks:
  ragflow:
    driver: bridge
  proxy:
    external: true
