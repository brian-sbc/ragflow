# The `ragflow` network is declared in docker-compose-base.yml (driver: bridge)
# and carries the internal services (mysql, minio, redis, infinity).
# We add the existing external `proxy` network here so the ragflow server can be
# reached by LiteLLM (which already lives on `proxy`).
networks:
  proxy:
    external: true
